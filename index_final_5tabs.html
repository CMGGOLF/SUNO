<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gugak Pulse - Korean Fusion Prompt Maker</title>
<style>
body { background:#0a0a0f; color:#eee; font-family:sans-serif; padding:20px; }
button { padding:12px 20px; margin:8px; font-size:15px; background:#c9a84c; color:#111; border:none; border-radius:8px; cursor:pointer; }
button:hover { background:#e8c96a; }
.section { background:#1f1f2b; padding:20px; margin:15px 0; border-radius:12px; }
#promptBox { background:#111; padding:20px; min-height:180px; white-space:pre-wrap; border-radius:8px; font-family:monospace; }
</style>
</head>
<body>

<h1>🎵 Gugak Pulse - 완전판 (GitHub용)</h1>

<!-- 용도별 빠른 시작 -->
<div class="section">
  <h3>⚡ 용도별 빠른 시작</h3>
  <button onclick="applyQuickStart('drive')">🚗 드라이브</button>
  <button onclick="applyQuickStart('night')">🌙 늦은 밤 감성</button>
  <button onclick="applyQuickStart('workout')">🏃 운동 / 조깅</button>
  <button onclick="applyQuickStart('hiphop')">🎤 힙합</button>
  <button onclick="applyQuickStart('labor')">🔨 노동가 / 작업</button>
  <button onclick="applyRandomPreset()">✨ 랜덤 추천</button>
</div>

<!-- 프롬프트 -->
<div class="section">
  <h3>프롬프트</h3>
  <div id="promptBox">버튼을 누르면 여기에 프롬프트가 생성됩니다.</div>
  
  <div style="margin-top:15px">
    <button onclick="copyPrompt()">📋 복사</button>
    <button onclick="applyGroovePreset()">⚡ 한국 그루브 추천 세팅</button>
    <button onclick="applyUltimateGroovePreset()">🔥 Ultimate Groove</button>
    <button onclick="resetAll()">↺ 초기화</button>
  </div>
</div>

<script>
// ==================== 완전 수정된 버전 ====================

let STATE = {
  genre: null, moods: [], instr: null, concept: null,
  bpm: 95, intensity: 5
};

function applyQuickStart(type) {
  resetAll(false);
 
  if (type === 'drive') {
    STATE.genre = 2; STATE.moods = [10, 13]; STATE.instr = 0; STATE.concept = 8;
    STATE.bpm = 98; STATE.intensity = 6;
  }
  else if (type === 'night') {
    STATE.genre = 2; STATE.moods = [1, 5, 8]; STATE.instr = 1; STATE.concept = 7;
    STATE.bpm = 82; STATE.intensity = 6;
  }
  else if (type === 'workout') {
    STATE.genre = 3; STATE.moods = [11, 15]; STATE.instr = 5; STATE.concept = 9;
    STATE.bpm = 128; STATE.intensity = 8;
  }
  else if (type === 'hiphop') {
    STATE.genre = 4; STATE.moods = [0, 14]; STATE.instr = 2; STATE.concept = 10;
    STATE.bpm = 92; STATE.intensity = 7;
  }
  else if (type === 'labor') {
    STATE.genre = 7; STATE.moods = [12]; STATE.instr = 5; STATE.concept = 11;
    STATE.bpm = 95; STATE.intensity = 5;
  }

  buildPrompt();
  
  let message = "✅ 세팅이 적용되었습니다!";
  if (type === 'drive') message = "✅ 드라이브 세팅이 적용되었습니다!";
  else if (type === 'night') message = "✅ 늦은 밤 감성 세팅이 적용되었습니다!";

  showToast(message);
}

function applyGroovePreset() {
  resetAll(false);
  STATE.genre = 3; STATE.moods = [1, 6]; STATE.instr = 0; STATE.concept = 5;
  STATE.bpm = 96; STATE.intensity = 6;
  buildPrompt();
  showToast("✅ 한국 그루브 추천 세팅이 적용되었습니다!");
}

function applyUltimateGroovePreset() {
  resetAll(false);
  STATE.genre = 3; STATE.moods = [1, 6]; STATE.instr = 0; STATE.concept = 5;
  STATE.bpm = 100; STATE.intensity = 7;
  buildPrompt();
  showToast("✅ Ultimate Groove 적용 완료!");
}

function applyRandomPreset() {
  resetAll(false);
  STATE.genre = Math.floor(Math.random() * 8);
  STATE.moods = [Math.floor(Math.random() * 17)];
  STATE.instr = Math.floor(Math.random() * 6);
  STATE.concept = Math.floor(Math.random() * 18);
  STATE.bpm = 75 + Math.floor(Math.random() * 50);
  STATE.intensity = 3 + Math.floor(Math.random() * 6);
  buildPrompt();
  showToast("✨ 랜덤 추천이 적용되었습니다!");
}

function buildPrompt() {
  let text = "";
  if (STATE.genre !== null) text += `[Genre] ${STATE.genre}\n`;
  if (STATE.moods.length > 0) text += `[Mood] ${STATE.moods.join(', ')}\n`;
  if (STATE.instr !== null) text += `[Instruments] ${STATE.instr}\n`;
  if (STATE.concept !== null) text += `[Concept] ${STATE.concept}\n`;
  text += `[BPM] ${STATE.bpm}\n`;
  text += `[Intensity] ${STATE.intensity}/10\n`;
  document.getElementById('promptBox').textContent = text || '버튼을 눌러주세요.';
}

function resetAll() {
  STATE.genre = null; STATE.moods = []; STATE.instr = null; STATE.concept = null;
  STATE.bpm = 95; STATE.intensity = 5;
  document.getElementById('promptBox').textContent = '버튼을 눌러주세요.';
}

function copyPrompt() {
  const text = document.getElementById('promptBox').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast("✅ 복사 완료!");
  });
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:30px;right:30px;background:#222;border:1px solid #c9a84c;color:#c9a84c;padding:12px 20px;border-radius:8px;z-index:9999';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.transition='all .3s'; t.style.opacity='0'; setTimeout(()=>document.body.removeChild(t),300); }, 2200);
}

window.onload = function() {
  document.getElementById('promptBox').textContent = '버튼을 눌러주세요.';
};
</script>

</body>
</html>
