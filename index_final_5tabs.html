<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수노 음악 프롬프트 생성기 v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0e0e10; --surface: #18181c; --surface2: #222228; --border: #2e2e38;
  --accent: #7c6ff7; --accent2: #a78bfa; --text: #f0f0f4; --muted: #888896;
  --chip-bg: #1e1e26; --error: #f87171; --success: #34d399; --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; padding: 2rem 1rem; }
.container { max-width: 780px; margin: 0 auto; }

header { text-align: center; margin-bottom: 1.8rem; }
header h1 { font-family: 'Space Mono', monospace; font-size: 1.6rem; color: var(--accent2); }
header p { font-size: 13px; color: var(--muted); }

.api-section { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.4rem; }
.api-row { display: flex; gap: 8px; }
.api-row input { flex: 1; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 12px; font-family: 'Space Mono', monospace; }
.api-row button { padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }

.tabs { display: flex; border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.3rem; }
.tab { flex: 1; padding: 11px 4px; background: var(--surface); border: none; border-right: 0.5px solid var(--border); cursor: pointer; font-size: 12px; font-weight: 600; color: var(--muted); text-align: center; }
.tab:last-child { border-right: none; }
.tab.on { background: var(--accent); color: #fff; }

.panel { display: none; }
.panel.on { display: block; }

.sec { margin-bottom: 1.1rem; }
.sl { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }

.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  padding: 6px 11px; border: 0.5px solid var(--border); border-radius: 18px; background: var(--chip-bg);
  cursor: pointer; font-size: 12px; color: var(--muted); transition: all .15s;
}
.chip.on { border-color: var(--accent); background: rgba(124,111,247,.18); color: var(--accent2); }

textarea, input[type=text] {
  width: 100%; padding: 9px 12px; border: 0.5px solid var(--border); border-radius: 7px;
  background: var(--surface); font-size: 13.5px; color: var(--text); resize: vertical;
}
textarea:focus, input:focus { border-color: var(--accent); }

.tbtns { display: flex; gap: 8px; margin-bottom: 1rem; }
.tbtn { flex: 1; padding: 9px; border: 0.5px solid var(--border); border-radius: 7px; background: var(--surface); cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted); text-align: center; }
.tbtn.on { border-color: var(--accent); background: rgba(124,111,247,.15); color: var(--accent2); }

.gbtn {
  width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px;
}

.result-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-top: 1.3rem; }
.result-title { font-size: 14px; font-weight: 700; color: var(--accent2); margin-bottom: 6px; }
.result-content { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 6px; padding: 11px 12px; font-size: 13.5px; line-height: 1.6; white-space: pre-wrap; }
.copy-btn { font-size: 11px; padding: 3px 8px; border: 0.5px solid var(--border); border-radius: 4px; background: var(--surface2); cursor: pointer; color: var(--muted); margin-top: 5px; }
.extra { margin-top: 1rem; padding-top: .9rem; border-top: 0.5px solid var(--border); }
.err { color: var(--error); padding: 11px; border: 0.5px solid #7f1d1d; border-radius: 6px; background: rgba(248,113,113,.06); }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>🎵 수노 음악 프롬프트 생성기 v2</h1>
  <p>Suno AI 전용 • 가사 기능 제거 • 로딩 표시 적용</p>
</header>

<!-- API Key -->
<div class="api-section">
  <label style="font-size:12px; color:#888; display:block; margin-bottom:5px;">🔑 OpenRouter API Key (필수)</label>
  <div class="api-row">
    <input type="password" id="api-key" placeholder="sk-or-...">
    <button onclick="saveKey()">저장</button>
  </div>
  <div id="key-status" style="font-size:11px; margin-top:5px; color:#34d399;">API Key를 입력 후 저장하세요</div>
</div>

<!-- 5개 탭 -->
<div class="tabs">
  <button class="tab on" onclick="switchTab('full')">상세<br>Full</button>
  <button class="tab" onclick="switchTab('quick')">키워드<br>Quick</button>
  <button class="tab" onclick="switchTab('yt')">유튜브<br>YouTube</button>
  <button class="tab" onclick="switchTab('shorts')">쇼츠<br>Shorts</button>
  <button class="tab" onclick="switchTab('trend')">추천<br>Trending</button>
</div>

<!-- FULL MODE -->
<div class="panel on" id="p-full">
  <div class="sec"><div class="sl">장르</div><div class="chips" id="g-chips"></div></div>
  <div class="sec"><div class="sl">무드</div><div class="chips" id="m-chips"></div></div>
  <div class="sec"><div class="sl">악기</div><div class="chips" id="i-chips"></div></div>
  <div class="sec"><div class="sl">보컬</div><div class="chips" id="v-chips"></div></div>
  <div class="sec"><div class="sl">BPM</div><input type="range" min="50" max="160" value="95" step="5" id="bpm" oninput="document.getElementById('bv').innerText=this.value+' BPM'"><span id="bv">95 BPM</span></div>
  <div class="sec"><div class="sl">추가 컨셉</div><input type="text" id="concept" placeholder="라흐마니노프 스타일..."></div>
  <button class="gbtn" id="btn-full" onclick="genFull()">프롬프트 생성</button>
  <div id="r-full"></div>
</div>

<!-- QUICK MODE -->
<div class="panel" id="p-quick">
  <div class="sec"><div class="sl">짧은 키워드</div><input type="text" id="kw-input" placeholder="슬픈 피아노 / epic cinematic..."></div>
  <button class="gbtn" id="btn-quick" onclick="genQuick()">자동 확장 생성</button>
  <div id="r-quick"></div>
</div>

<!-- YOUTUBE MODE -->
<div class="panel" id="p-yt">
  <div class="sec"><div class="sl">유튜브 링크</div><input type="text" id="yt-url" placeholder="https://www.youtube.com/watch?v=..."></div>
  <button class="gbtn" id="btn-yt" onclick="genYT()">링크 분석 후 생성</button>
  <div id="r-yt"></div>
</div>

<!-- SHORTS MODE -->
<div class="panel" id="p-shorts">
  <div class="sec"><div class="sl">쇼츠 컨셉</div><input type="text" id="sh-concept" placeholder="새벽 감성 브이로그..."></div>
  <button class="gbtn" id="btn-shorts" onclick="genShorts()">쇼츠 프롬프트 생성</button>
  <div id="r-sh"></div>
</div>

<!-- TRENDING MODE -->
<div class="panel" id="p-trend">
  <div class="sec"><div class="sl">콘텐츠 유형 선택</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
      <button class="chip" onclick="selectTrend(this,'인생 사연 감동 스토리')">인생 사연 감동 스토리</button>
      <button class="chip" onclick="selectTrend(this,'공부 집중 로파이')">공부 집중 로파이</button>
      <button class="chip" onclick="selectTrend(this,'운동 에너지 힙합')">운동 에너지 힙합</button>
      <button class="chip" onclick="selectTrend(this,'새벽 감성 발라드')">새벽 감성 발라드</button>
      <button class="chip" onclick="selectTrend(this,'힐링 자연 앰비언트')">힐링 자연 앰비언트</button>
      <button class="chip" onclick="selectTrend(this,'시네마틱 드라마')">시네마틱 드라마</button>
    </div>
  </div>
  <button class="gbtn" id="btn-trend" onclick="genTrend()">조회수형 스타일 생성</button>
  <div id="r-tr"></div>
</div>

</div>

<script>
const GENRES = [{en:'Pop',kr:'팝'},{en:'K-pop',kr:'케이팝'},{en:'J-pop',kr:'제이팝'},{en:'Hip-hop',kr:'힙합'},{en:'Trap',kr:'트랩'},{en:'R&B',kr:'알앤비'},{en:'Soul',kr:'소울'},{en:'EDM',kr:'EDM'},{en:'House',kr:'하우스'},{en:'Synthwave',kr:'신스웨이브'},{en:'Electronic',kr:'일렉트로닉'},{en:'Rock',kr:'락'},{en:'Metal',kr:'메탈'},{en:'Blues',kr:'블루스'},{en:'Jazz',kr:'재즈'},{en:'Funk',kr:'펑크'},{en:'Reggae',kr:'레게'},{en:'Country',kr:'컨트리'},{en:'Indie',kr:'인디'},{en:'Lo-fi',kr:'로우파이'},{en:'Folk',kr:'포크'},{en:'Classical',kr:'클래식'},{en:'Ambient',kr:'앰비언트'},{en:'Cinematic',kr:'시네마틱'},{en:'Epic',kr:'에픽'}];
const MOODS = [{en:'Emotional',kr:'감성적인'},{en:'Romantic',kr:'로맨틱한'},{en:'Sentimental',kr:'감상적인'},{en:'Melancholic',kr:'우울한'},{en:'Sad',kr:'슬픈'},{en:'Dark',kr:'어두운'},{en:'Nostalgic',kr:'향수를 불러일으키는'},{en:'Mysterious',kr:'신비로운'},{en:'Dreamy',kr:'몽환적인'},{en:'Calm',kr:'잔잔한'},{en:'Chill',kr:'차분한'},{en:'Uplifting',kr:'고양되는'},{en:'Energetic',kr:'에너지 넘치는'}];
const INSTS = [{en:'Piano',kr:'피아노'},{en:'Acoustic guitar',kr:'어쿠스틱 기타'},{en:'Electric guitar',kr:'일렉 기타'},{en:'Synth bass',kr:'신스 베이스'},{en:'808 drums',kr:'808 드럼'},{en:'Strings section',kr:'스트링 섹션'},{en:'Brass section',kr:'브라스 섹션'},{en:'Saxophone',kr:'색소폰'},{en:'Lo-fi vinyl noise',kr:'로파이 바이닐 노이즈'},{en:'Percussion',kr:'타악기'},{en:'Reverb-heavy pads',kr:'리버브 강한 패드'},{en:'Ambient textures',kr:'앰비언트 배경음'}];
const VOCALS = [{en:'Soft female vocals',kr:'부드러운 여성 보컬'},{en:'Powerful female vocals',kr:'파워풀한 여성 보컬'},{en:'Deep male voice',kr:'깊고 낮은 남성 보컬'},{en:'Soulful male vocals',kr:'소울 넘치는 남성 보컬'},{en:'Whispered vocals',kr:'속삭이는 보컬'},{en:'Emotional vocal delivery',kr:'감성적 표현'}];

let currentTool = 'suno';
let selections = {genres:[],moods:[],insts:[],vocals:[]};
let apiKey = '';
let currentTrend = '';

window.onload = function() {
  const saved = localStorage.getItem('openrouter_key');
  if (saved) {
    apiKey = saved;
    document.getElementById('api-key').value = saved;
    document.getElementById('key-status').textContent = '✓ API Key 설정 완료';
    document.getElementById('key-status').style.color = '#34d399';
  }
  createChips('g-chips', GENRES, 'genres');
  createChips('m-chips', MOODS, 'moods');
  createChips('i-chips', INSTS, 'insts');
  createChips('v-chips', VOCALS, 'vocals');
};

function createChips(id, data, type) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  data.forEach(item => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.innerHTML = `${item.kr} <span style="font-size:10px;opacity:0.6">(${item.en})</span>`;
    b.onclick = () => {
      b.classList.toggle('on');
      const arr = selections[type];
      const i = arr.indexOf(item.en);
      if (i === -1) arr.push(item.en);
      else arr.splice(i, 1);
    };
    el.appendChild(b);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  event.currentTarget.classList.add('on');
  document.getElementById('p-' + tab).classList.add('on');
}

function saveKey() {
  const v = document.getElementById('api-key').value.trim();
  if (!v) return;
  apiKey = v;
  localStorage.setItem('openrouter_key', v);
  document.getElementById('key-status').textContent = '✓ API Key 설정 완료';
  document.getElementById('key-status').style.color = '#34d399';
}

function setLoading(btnId, isLoading) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  if (isLoading) {
    btn.dataset.originalText = btn.innerHTML;
    btn.innerHTML = '생성 중...';
    btn.disabled = true;
  } else {
    btn.innerHTML = btn.dataset.originalText || '생성';
    btn.disabled = false;
  }
}

async function callAI(prompt, resultId) {
  if (!apiKey) {
    document.getElementById(resultId).innerHTML = `<div class="err">API Key를 먼저 저장해주세요.</div>`;
    return null;
  }
  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'nvidia/nemotron-3-super-120b-a12b:free',
        max_tokens: 2000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return JSON.parse(data.choices[0].message.content.replace(/```json|```/g, '').trim());
  } catch (e) {
    document.getElementById(resultId).innerHTML = `<div class="err">${e.message}</div>`;
    return null;
  }
}

function showResult(resultId, data) {
  let html = `<div class="result-box">
    <div class="result-title">[제목]</div><div class="result-content">${data.title || ''}</div>
    <div class="result-title" style="margin-top:1rem;">[스타일 프롬프트]</div><div class="result-content">${data.style_prompt || ''}</div>`;
  if (data.viral_reason) html += `<div class="extra"><div class="result-title">[조회수 추천 이유]</div><div class="result-content">${data.viral_reason}</div></div>`;
  html += `</div>`;
  document.getElementById(resultId).innerHTML = html;
}

// Full Mode
async function genFull() {
  const btn = document.getElementById('btn-full');
  setLoading('btn-full', true);

  const concept = document.getElementById('concept').value.trim();
  const prompt = `수노음악 가이드 기반으로 프롬프트를 만들어줘.
장르: ${selections.genres.join(', ')}
무드: ${selections.moods.join(', ')}
악기: ${selections.insts.join(', ')}
보컬: ${selections.vocals.join(', ')}
BPM: ${document.getElementById('bpm').value}
컨셉: ${concept}

JSON: {"title":"","style_prompt":""}`;

  const result = await callAI(prompt, 'r-full');
  setLoading('btn-full', false);
  if (result) showResult('r-full', result);
}

// Quick Mode
async function genQuick() {
  const kw = document.getElementById('kw-input').value.trim();
  if (!kw) return alert('키워드를 입력하세요');
  setLoading('btn-quick', true);

  const prompt = `키워드 "${kw}"를 분석해서 프롬프트 만들어줘.

JSON: {"title":"","style_prompt":""}`;

  const result = await callAI(prompt, 'r-quick');
  setLoading('btn-quick', false);
  if (result) showResult('r-quick', result);
}

// YouTube Mode
async function genYT() {
  const url = document.getElementById('yt-url').value.trim();
  if (!url) return alert('유튜브 링크를 입력해주세요.');
  setLoading('btn-yt', true);

  const prompt = `유튜브 링크 분석 후 비슷한 스타일 프롬프트 만들어줘. URL: ${url}

JSON: {"title":"","style_prompt":""}`;

  const result = await callAI(prompt, 'r-yt');
  setLoading('btn-yt', false);
  if (result) showResult('r-yt', result);
}

// Shorts Mode
async function genShorts() {
  const concept = document.getElementById('sh-concept').value.trim();
  setLoading('btn-shorts', true);

  const prompt = `쇼츠용 음악 프롬프트 만들어줘. 컨셉: ${concept}

JSON: {"title":"","style_prompt":""}`;

  const result = await callAI(prompt, 'r-sh');
  setLoading('btn-shorts', false);
  if (result) showResult('r-sh', result);
}

// Trending Mode
function selectTrend(el, text) {
  currentTrend = text;
  document.querySelectorAll('#p-trend .chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
}

async function genTrend() {
  if (!currentTrend) return alert('콘텐츠 유형을 선택하세요');
  setLoading('btn-trend', true);

  const prompt = `조회수 최적화 음악 스타일 추천. 유형: ${currentTrend}

JSON: {"title":"","style_prompt":"","viral_reason":""}`;

  const result = await callAI(prompt, 'r-tr');
  setLoading('btn-trend', false);
  if (result) showResult('r-tr', result);
}
</script>
</body>
</html>
